<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" width="1200" height="980" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="980" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold">MediCompanion — RAG v2 Architecture</text>
  <text x="600" y="58" text-anchor="middle" fill="#64748b" font-size="12">Query Rewrite · HyDE · Multi-Query · BM25 Hybrid · Self-Verify · LLM-as-Judge</text>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 1 — FRONTEND  (top-left)
  ══════════════════════════════════════════════════════════ -->
  <rect x="30" y="75" width="260" height="350" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="97" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">React Native Frontend</text>
  <text x="160" y="112" text-anchor="middle" fill="#64748b" font-size="10">Expo · TypeScript</text>

  <!-- Chat screen box -->
  <rect x="50" y="120" width="220" height="70" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="160" y="139" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">ChatScreen.tsx</text>
  <text x="160" y="154" text-anchor="middle" fill="#64748b" font-size="9">sendSpecificMessage()</text>
  <text x="160" y="167" text-anchor="middle" fill="#64748b" font-size="9">POST /api/chat  ·  session_id</text>
  <text x="160" y="180" text-anchor="middle" fill="#64748b" font-size="9">message history (last 10)</text>

  <!-- Meta row UI -->
  <rect x="50" y="205" width="220" height="90" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="160" y="222" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Meta Row UI  (v2)</text>
  <!-- badges mockup -->
  <rect x="60" y="230" width="68" height="16" rx="4" fill="#166534"/>
  <text x="94" y="242" text-anchor="middle" fill="#86efac" font-size="9">Faithful 73%</text>
  <rect x="134" y="230" width="62" height="16" rx="4" fill="#7f1d1d"/>
  <text x="165" y="242" text-anchor="middle" fill="#fca5a5" font-size="9">⚠ Unverified</text>
  <rect x="202" y="230" width="58" height="16" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="231" y="242" text-anchor="middle" fill="#94a3b8" font-size="9">Ollama</text>
  <text x="160" y="265" text-anchor="middle" fill="#64748b" font-size="9">confidenceLabel  ·  sources chips</text>
  <text x="160" y="278" text-anchor="middle" fill="#64748b" font-size="9">latency_ms  ·  rewritten_query</text>
  <text x="160" y="291" text-anchor="middle" fill="#64748b" font-size="9">faithfulness_score  ·  hallu_score</text>

  <!-- Admin panel -->
  <rect x="50" y="308" width="220" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="160" y="327" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">AdminPanel.tsx</text>
  <text x="160" y="342" text-anchor="middle" fill="#64748b" font-size="9">GET/POST /admin/config  ·  upload PDF</text>
  <text x="160" y="355" text-anchor="middle" fill="#64748b" font-size="9">provider toggle  ·  RAG on/off</text>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 2 — NODE.JS BACKEND  (center)
  ══════════════════════════════════════════════════════════ -->
  <rect x="330" y="75" width="540" height="820" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="97" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">Node.js Backend  (http.createServer)</text>
  <text x="600" y="112" text-anchor="middle" fill="#64748b" font-size="10">server.js  ·  port 5050</text>

  <!-- Stage labels column -->
  <!-- Stage 0: Config -->
  <rect x="350" y="120" width="500" height="42" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="136" fill="#f59e0b" font-size="10" font-weight="bold">① getRuntimeConfig()</text>
  <text x="370" y="151" fill="#64748b" font-size="9">MySQL app_config row → runtimeCfg  ·  provider (openai | local)  ·  rag_enabled  ·  top_k</text>

  <!-- Stage 1: PII -->
  <rect x="350" y="172" width="500" height="32" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="186" fill="#f59e0b" font-size="10" font-weight="bold">② maskPii(query)</text>
  <text x="370" y="198" fill="#64748b" font-size="9">regex redact: patient name · DOB · MRN · phone · SSN</text>

  <!-- Stage 2: rewrite -->
  <rect x="350" y="214" width="500" height="42" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="229" fill="#f59e0b" font-size="10" font-weight="bold">③ rewriteQuery()  +  generateQueryVariants()</text>
  <text x="370" y="244" fill="#64748b" font-size="9">LLM expands query → clinical terms  ·  3 query variants for multi-retrieval</text>

  <!-- Stage 3: HyDE -->
  <rect x="350" y="266" width="500" height="42" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="281" fill="#f59e0b" font-size="10" font-weight="bold">④ hydeEmbed()</text>
  <text x="370" y="296" fill="#64748b" font-size="9">LLM generates hypothetical answer → embed it → better semantic recall</text>

  <!-- Stage 4: Hybrid Retrieve -->
  <rect x="350" y="318" width="500" height="82" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="334" fill="#f59e0b" font-size="10" font-weight="bold">⑤ hybridRetrieve()</text>
  <text x="370" y="349" fill="#64748b" font-size="9">For each query variant + HyDE vector:</text>
  <text x="390" y="362" fill="#64748b" font-size="9">• embedCached()  → LRU Map (max 500, md5 key)</text>
  <text x="390" y="374" fill="#64748b" font-size="9">• match_medical_documents RPC (pgvector cosine, top-k)</text>
  <text x="390" y="386" fill="#64748b" font-size="9">• bm25Score()  → BM25 Okapi pure-JS lexical score</text>
  <text x="390" y="398" fill="#64748b" font-size="9">• hybrid = 0.65 × dense + 0.35 × BM25  · dedup by chunk_id</text>

  <!-- Stage 5: Build context -->
  <rect x="350" y="410" width="500" height="42" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="425" fill="#f59e0b" font-size="10" font-weight="bold">⑥ buildRagContextV2(chunks)</text>
  <text x="370" y="440" fill="#64748b" font-size="9">section label (abstract/methods/results…)  ·  medical entities (regex NER)  ·  hybrid score</text>

  <!-- Stage 6: Self-verify -->
  <rect x="350" y="462" width="500" height="62" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="478" fill="#f59e0b" font-size="10" font-weight="bold">⑦ selfVerifyGenerate()  (maxIter = 2)</text>
  <text x="370" y="492" fill="#64748b" font-size="9">Generate answer  →  faithfulnessScore()  (token overlap − stopwords)</text>
  <text x="370" y="504" fill="#64748b" font-size="9">if faithfulness &lt; 0.40  →  repair prompt  →  regenerate  ·  else break</text>
  <text x="370" y="516" fill="#64748b" font-size="9">llmCall() wraps OpenAI / Ollama chat endpoint</text>

  <!-- Stage 7: LLM judge -->
  <rect x="350" y="534" width="500" height="42" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="550" fill="#f59e0b" font-size="10" font-weight="bold">⑧ llmHallucinationCheck()</text>
  <text x="370" y="564" fill="#64748b" font-size="9">JSON-structured prompt  ·  parse failure → faithfulness fallback  ·  returns 0–1 score</text>

  <!-- Stage 8: Scoring -->
  <rect x="350" y="586" width="500" height="52" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="602" fill="#f59e0b" font-size="10" font-weight="bold">⑨ confidenceBand()  +  safetyCheck()</text>
  <text x="370" y="616" fill="#64748b" font-size="9">score = faithfulness×0.45 + (1−hallu)×0.35 + relevance×0.20</text>
  <text x="370" y="628" fill="#64748b" font-size="9">safetyCheck: block prescriptive dosage only  (hallucination block removed)</text>

  <!-- Stage 9: Save history -->
  <rect x="350" y="648" width="500" height="32" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="663" fill="#f59e0b" font-size="10" font-weight="bold">⑩ saveRagChatHistory()  (fire-and-forget)</text>
  <text x="370" y="675" fill="#64748b" font-size="9">Supabase chat_history  ·  rewritten_query · faithfulness · hallucination · embed_via</text>

  <!-- Stage 10: Response -->
  <rect x="350" y="690" width="500" height="52" rx="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="370" y="706" fill="#93c5fd" font-size="10" font-weight="bold">⑪ JSON Response  →  Frontend</text>
  <text x="370" y="720" fill="#64748b" font-size="9">reply · confidence_label · rag_used · sources · rewritten_query</text>
  <text x="370" y="733" fill="#64748b" font-size="9">faithfulness_score · hallucination_score · hallu_method · llm_used</text>
  <text x="370" y="746" fill="#64748b" font-size="9">embed_via · latency_ms { embed · retrieve · generate · judge }</text>

  <!-- PDF Ingest box -->
  <rect x="350" y="752" width="500" height="62" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="768" fill="#10b981" font-size="10" font-weight="bold">PDF Ingest  —  POST /api/upload-pdf</text>
  <text x="370" y="782" fill="#64748b" font-size="9">pdf-parse → maskPii → chunk (800 chars / 100 overlap)</text>
  <text x="370" y="794" fill="#64748b" font-size="9">detectSection · extractMedicalEntities · embedCached → upsert medical_documents</text>
  <text x="370" y="806" fill="#64748b" font-size="9">metadata: { section, entities, embed_model, page_count, total_chunks }</text>

  <!-- MySQL config note -->
  <rect x="350" y="824" width="240" height="48" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="370" y="840" fill="#94a3b8" font-size="10" font-weight="bold">MySQL — app_config</text>
  <text x="370" y="853" fill="#64748b" font-size="9">ai_provider · openai_model · rag_top_k</text>
  <text x="370" y="866" fill="#64748b" font-size="9">supabase_url · openai_api_key · local_api_url</text>

  <!-- MySQL chat note -->
  <rect x="610" y="824" width="240" height="48" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="630" y="840" fill="#94a3b8" font-size="10" font-weight="bold">MySQL — chat_messages</text>
  <text x="630" y="853" fill="#64748b" font-size="9">user_id · session_id · role</text>
  <text x="630" y="866" fill="#64748b" font-size="9">content · created_at</text>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 3 — SUPABASE  (top-right)
  ══════════════════════════════════════════════════════════ -->
  <rect x="910" y="75" width="260" height="310" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="1040" y="97" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">Supabase + pgvector</text>
  <text x="1040" y="112" text-anchor="middle" fill="#64748b" font-size="10">PostgreSQL  ·  vector(768)  ·  IVFFlat cosine</text>

  <!-- medical_documents table -->
  <rect x="930" y="120" width="220" height="120" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1040" y="138" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">medical_documents</text>
  <text x="945" y="153" fill="#64748b" font-size="9">id  bigint  PK</text>
  <text x="945" y="165" fill="#64748b" font-size="9">title  text</text>
  <text x="945" y="177" fill="#64748b" font-size="9">chunk_id  int</text>
  <text x="945" y="189" fill="#64748b" font-size="9">content  text</text>
  <text x="945" y="201" fill="#64748b" font-size="9">embedding  vector(768)</text>
  <text x="945" y="213" fill="#64748b" font-size="9">metadata  jsonb  { section, entities, embed_model }</text>
  <text x="945" y="228" fill="#475569" font-size="8">RPC: match_medical_documents(query_embedding, match_count)</text>

  <!-- chat_history table -->
  <rect x="930" y="252" width="220" height="120" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1040" y="270" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">chat_history  (v2)</text>
  <text x="945" y="285" fill="#64748b" font-size="9">session_id  text  (idx)</text>
  <text x="945" y="297" fill="#64748b" font-size="9">query  ·  rewritten_query</text>
  <text x="945" y="309" fill="#64748b" font-size="9">answer  text</text>
  <text x="945" y="321" fill="#64748b" font-size="9">faithfulness_score  float</text>
  <text x="945" y="333" fill="#64748b" font-size="9">hallucination_score  float</text>
  <text x="945" y="345" fill="#64748b" font-size="9">sources  text  ·  embed_via  text</text>
  <text x="945" y="357" fill="#64748b" font-size="9">created_at  timestamptz</text>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 4 — AI PROVIDERS  (bottom-right)
  ══════════════════════════════════════════════════════════ -->
  <rect x="910" y="400" width="260" height="195" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1040" y="422" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">AI Providers</text>

  <!-- OpenAI box -->
  <rect x="930" y="432" width="220" height="70" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1040" y="450" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">OpenAI  (cloud)</text>
  <text x="945" y="466" fill="#64748b" font-size="9">Embed: text-embedding-3-small  dim=768</text>
  <text x="945" y="478" fill="#64748b" font-size="9">Chat:  gpt-4o / gpt-4o-mini</text>
  <text x="945" y="491" fill="#64748b" font-size="9">api.openai.com/v1</text>

  <!-- Ollama box -->
  <rect x="930" y="514" width="220" height="70" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1040" y="532" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">Ollama  (local)</text>
  <text x="945" y="548" fill="#64748b" font-size="9">Embed: nomic-embed-text:latest  768-dim</text>
  <text x="945" y="560" fill="#64748b" font-size="9">Chat:  llama3.1:8b (or any ollama model)</text>
  <text x="945" y="573" fill="#64748b" font-size="9">http://127.0.0.1:11434/api</text>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 5 — MySQL  (bottom-right lower)
  ══════════════════════════════════════════════════════════ -->
  <rect x="910" y="610" width="260" height="140" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1040" y="632" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">MySQL</text>
  <text x="1040" y="647" text-anchor="middle" fill="#64748b" font-size="10">port 3306  ·  medicompanion DB</text>

  <rect x="930" y="655" width="220" height="38" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1040" y="671" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold">app_config</text>
  <text x="945" y="685" fill="#64748b" font-size="9">provider · model · API keys · RAG settings</text>

  <rect x="930" y="700" width="220" height="38" rx="7" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1040" y="716" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold">chat_messages  ·  users</text>
  <text x="945" y="730" fill="#64748b" font-size="9">session history  ·  user auth</text>

  <!-- ══════════════════════════════════════════════════════════
       ARROWS / CONNECTORS
  ══════════════════════════════════════════════════════════ -->
  <!-- Frontend → Backend -->
  <line x1="290" y1="210" x2="330" y2="210" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="330,206 338,210 330,214" fill="#3b82f6"/>
  <text x="310" y="205" text-anchor="middle" fill="#3b82f6" font-size="8">POST</text>

  <!-- Backend → Supabase (vector) -->
  <line x1="870" y1="380" x2="910" y2="200" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="906,193 914,197 910,206" fill="#10b981"/>
  <text x="910" y="290" fill="#10b981" font-size="8">RPC +</text>
  <text x="910" y="300" fill="#10b981" font-size="8">upsert</text>

  <!-- Backend → Supabase (chat_history) -->
  <line x1="870" y1="664" x2="930" y2="330" stroke="#10b981" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="928,322 934,328 926,335" fill="#10b981"/>

  <!-- Backend → OpenAI -->
  <line x1="870" y1="490" x2="930" y2="480" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="924,476 932,480 924,484" fill="#f59e0b"/>

  <!-- Backend → Ollama -->
  <line x1="870" y1="510" x2="930" y2="548" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="924,544 932,548 924,552" fill="#f59e0b"/>

  <!-- Backend → MySQL -->
  <line x1="870" y1="838" x2="910" y2="680" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="908,672 914,678 906,684" fill="#ef4444"/>

  <!-- Response arrow back -->
  <line x1="330" y1="250" x2="290" y2="250" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="290,246 282,250 290,254" fill="#8b5cf6"/>
  <text x="310" y="245" text-anchor="middle" fill="#8b5cf6" font-size="8">JSON</text>

  <!-- ══════════════════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════════════════ -->
  <rect x="30" y="875" width="840" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="895" fill="#94a3b8" font-size="11" font-weight="bold">Legend</text>

  <line x1="50" y1="912" x2="90" y2="912" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="98" y="916" fill="#64748b" font-size="10">HTTP request / response</text>

  <line x1="200" y1="912" x2="240" y2="912" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="248" y="916" fill="#64748b" font-size="10">Supabase pgvector call</text>

  <line x1="380" y1="912" x2="420" y2="912" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="428" y="916" fill="#64748b" font-size="10">LLM API call (embed / chat)</text>

  <line x1="570" y1="912" x2="610" y2="912" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="618" y="916" fill="#64748b" font-size="10">MySQL query</text>

  <text x="50" y="940" fill="#475569" font-size="9">Embedding cache: LRU Map · max 500 entries · md5 key  |  Both OpenAI and Ollama output 768-dim vectors → same pgvector column  |  Scores: faithfulness (token overlap) · hallu (LLM judge) · hybrid (BM25 + cosine)</text>
  <text x="50" y="952" fill="#475569" font-size="9">Safety: prescriptive dosage blocked only — hallucination block removed (unreliable with local models)  |  Fire-and-forget: saveRagChatHistory never blocks chat response</text>

</svg>
